<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Yo, Whaddup Bot</title>
<style>
  :root {
    --bg: #F4F1EA;
    --panel: #FDFCFA;
    --border: #E6E1D6;
    --text: #2B2A27;
    --text-dim: #7C7869;
    --accent: #D97757;
    --bubble-user: #EDE9E0;
    --bubble-bot: #FDFCFA;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    font-family: -apple-system, 'Segoe UI', sans-serif;
  }

  .app {
    width: 100%;
    max-width: 720px;
    height: 90vh;
    max-height: 780px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 16px;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(43,42,39,0.08);
  }

  .header {
    padding: 18px 24px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .header .mark {
    width: 32px;
    height: 32px;
    border-radius: 8px;
    background: var(--accent);
    display: flex;
    align-items: center;
    justify-content: center;
    color: white;
    font-size: 16px;
    font-weight: 700;
  }

  .header .name {
    font-size: 15px;
    font-weight: 600;
    color: var(--text);
  }

  .header .status {
    font-size: 12px;
    color: var(--text-dim);
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 28px 24px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .messages::-webkit-scrollbar { width: 6px; }
  .messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  .row {
    display: flex;
    gap: 12px;
    align-items: flex-start;
  }

  .row.user { flex-direction: row-reverse; }

  .bubble-avatar {
    width: 28px;
    height: 28px;
    border-radius: 8px;
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    font-weight: 700;
  }

  .row.bot .bubble-avatar { background: var(--accent); color: white; }
  .row.user .bubble-avatar { background: var(--bubble-user); color: var(--text); }

  .msg {
    max-width: 74%;
    padding: 12px 16px;
    border-radius: 14px;
    font-size: 15px;
    line-height: 1.55;
    white-space: pre-wrap;
  }

  .row.bot .msg {
    background: var(--bubble-bot);
    border: 1px solid var(--border);
    color: var(--text);
    border-top-left-radius: 4px;
  }

  .row.user .msg {
    background: var(--bubble-user);
    color: var(--text);
    border-top-right-radius: 4px;
  }

  .msg.typing { color: var(--text-dim); font-style: italic; }

  .input-area {
    padding: 16px 20px 20px;
    border-top: 1px solid var(--border);
  }

  .input-shell {
    display: flex;
    align-items: flex-end;
    gap: 8px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 10px 10px 10px 16px;
  }

  .input-shell textarea {
    flex: 1;
    border: none;
    outline: none;
    resize: none;
    font-size: 15px;
    color: var(--text);
    background: transparent;
    max-height: 120px;
    line-height: 1.4;
    padding: 6px 0;
    font-family: inherit;
  }

  .input-shell textarea::placeholder { color: var(--text-dim); }

  .send-btn {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    border: none;
    background: var(--accent);
    color: white;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: opacity 0.15s ease;
  }

  .send-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .send-btn svg { width: 16px; height: 16px; }
</style>
</head>
<body>

<div class="app">
  <div class="header">
    <div class="mark">Y</div>
    <div>
      <div class="name">Yo, Whaddup Bot</div>
      <div class="status">straight vibes, no cap</div>
    </div>
  </div>

  <div class="messages" id="messages">
    <div class="row bot">
      <div class="bubble-avatar">Y</div>
      <div class="msg">Yooo what's good fam! I'm your homie bot, here to kick it and chat. What's on ya mind, dawg?</div>
    </div>
  </div>

  <div class="input-area">
    <div class="input-shell">
      <textarea id="userInput" rows="1" placeholder="Say somethin', fam..."></textarea>
      <button class="send-btn" id="sendBtn" aria-label="Send message">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 19V5" /><path d="M5 12l7-7 7 7" />
        </svg>
      </button>
    </div>
  </div>
</div>

<script>
  const messagesEl = document.getElementById('messages');
  const input = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');

  let history = [];

  function addRow(text, sender) {
    const row = document.createElement('div');
    row.className = `row ${sender}`;
    const avatar = document.createElement('div');
    avatar.className = 'bubble-avatar';
    avatar.textContent = sender === 'bot' ? 'Y' : 'U';
    const msg = document.createElement('div');
    msg.className = 'msg';
    msg.textContent = text;
    row.appendChild(avatar);
    row.appendChild(msg);
    messagesEl.appendChild(row);
    messagesEl.scrollTop = messagesEl.scrollHeight;
    return msg;
  }

  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
  });

  async function sendMessage() {
    const text = input.value.trim();
    if (!text) return;

    addRow(text, 'user');
    history.push({ role: 'user', content: text });
    input.value = '';
    input.style.height = 'auto';
    sendBtn.disabled = true;

    const typingEl = addRow('typing...', 'bot');
    typingEl.classList.add('typing');

    try {
      // This calls OUR OWN backend, not OpenRouter directly.
      // The backend (server.js) holds the real API key and forwards the request.
      const response = await fetch('/api/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ messages: history })
      });

      const data = await response.json();

      typingEl.parentElement.remove();

      if (!response.ok) {
        addRow(`Yo, server hiccup: ${data.error || 'unknown error'}`, 'bot');
        return;
      }

      addRow(data.reply, 'bot');
      history.push({ role: 'assistant', content: data.reply });

    } catch (err) {
      typingEl.parentElement.remove();
      addRow("Yo somethin' went sideways, fam. Try again in a sec.", 'bot');
      console.error(err);
    } finally {
      sendBtn.disabled = false;
      input.focus();
    }
  }

  sendBtn.addEventListener('click', sendMessage);
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendMessage();
    }
  });
</script>

</body>
</html>
